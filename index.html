<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="Offline small business management PWA">
    <title>LedgerLite Business</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/favicon.ico" sizes="any">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-mark">L</div>
          <div>
            <strong>LedgerLite</strong>
            <span>Offline business manager</span>
          </div>
        </div>
        <nav id="nav" class="nav"></nav>
        <div class="sync-card">
          <span class="status-dot"></span>
          <div>
            <strong>Local only</strong>
            <span>Data stays in this browser</span>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuBtn" class="icon-button mobile-only" type="button" aria-label="Open menu">☰</button>
          <div>
            <p id="eyebrow" class="eyebrow">Dashboard</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="top-actions">
            <button id="installBtn" class="secondary hidden" type="button">Install app</button>
          </div>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <div id="drawerBackdrop" class="drawer-backdrop"></div>
    <div id="modalRoot"></div>
    <div id="toast" class="toast" role="status"></div>

    <script src="app.js" defer></script>
  </body>
</html>
